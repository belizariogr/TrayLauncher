name: Build & Release

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Read version from package.json
        id: pkg
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$(node -p "require('./package.json').version")-dev" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Electron app
        run: bun run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc /DAppVersion=${{ steps.pkg.outputs.version }} scripts\installer.iss

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: TrayLauncher ${{ steps.pkg.outputs.tag }}
          draft: false
          prerelease: ${{ steps.pkg.outputs.prerelease }}
          files: |
            dist/TrayLauncher-portable.exe
            dist/TrayLauncher-Setup.exe
