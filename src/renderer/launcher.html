<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'">
  <link rel="stylesheet" href="launcher.css">
</head>
<body>
  <div id="app">
    <div id="content">
      <div id="grid"></div>
    </div>
    <div id="toolbar">
      <button id="btn-settings" title="Configurações">
        <img src="../../assets/icon/cog.svg" width="20" height="20" alt="Settings">
      </button>
      <button id="btn-quit" title="Fechar aplicação">
        <img src="../../assets/icon/power-off.svg" width="20" height="20" alt="Fechar">
      </button>
    </div>
  </div>
  <script src="launcher.js"></script>
</body>
</html>
