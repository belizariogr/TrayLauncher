<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div id="app">

    <section class="card">
      <h3 data-i18n="language">Idioma</h3>
      <select id="select-language" class="lang-select">
        <option value="pt-BR">Português (Brasil)</option>
        <option value="en-US">English (US)</option>
        <option value="es-ES">Español (España)</option>
      </select>
    </section>

    <section class="card">
      <h3 data-i18n="viewMode">Modo de visualização</h3>
      <div class="toggle-group">
        <button id="btn-icons" class="toggle" data-mode="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="2" y="2" width="9" height="9" rx="1.5"/>
            <rect x="13" y="2" width="9" height="9" rx="1.5"/>
            <rect x="2" y="13" width="9" height="9" rx="1.5"/>
            <rect x="13" y="13" width="9" height="9" rx="1.5"/>
          </svg>
          <span data-i18n="viewIcons">Ícones</span>
        </button>
        <button id="btn-list" class="toggle" data-mode="list">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6" stroke-linecap="round" stroke-width="2.5"/>
            <line x1="3" y1="12" x2="3.01" y2="12" stroke-linecap="round" stroke-width="2.5"/>
            <line x1="3" y1="18" x2="3.01" y2="18" stroke-linecap="round" stroke-width="2.5"/>
          </svg>
          <span data-i18n="viewList">Lista</span>
        </button>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h3 data-i18n="launcherItems">Itens do launcher</h3>
        <div class="add-group">
          <button id="btn-add-file"      class="btn-primary"                  data-i18n="addFile">+ Arquivo</button>
          <button id="btn-add-folder"    class="btn-primary btn-secondary"    data-i18n="addFolder">+ Pasta</button>
          <button id="btn-add-separator" class="btn-primary btn-secondary"    data-i18n="addSeparator">+ Separador</button>
        </div>
      </div>
      <p class="hint" data-i18n="itemsHint">Executáveis, atalhos (.lnk), .bat, pastas</p>
      <div id="items-list"></div>
    </section>

    <footer class="about-footer">
      <button id="btn-about" class="btn-about" data-i18n="aboutBtn">Sobre</button>
    </footer>

  </div>

  <!-- ── About Modal ──────────────────────────────────────────────────────── -->
  <div id="about-modal" class="modal-backdrop hidden">
    <div class="modal-box about-modal-box">
      <div class="modal-header">
        <span data-i18n="aboutTitle">Sobre o TrayLauncher</span>
        <button id="about-modal-close" class="modal-close-btn">✕</button>
      </div>
      <div class="about-body">
        <div class="about-app-name">TrayLauncher</div>
        <div class="about-version" id="about-version"></div>
        <div class="about-divider"></div>
        <div class="about-dev-label" data-i18n="developedBy">Desenvolvido por</div>
        <div class="about-dev-name">Belizário G. Ribeiro Filho</div>
        <button id="about-email-btn" class="about-email">belizariogr@gmail.com</button>
      </div>
      <div class="modal-footer">
        <button id="about-close" class="btn-primary btn-secondary" data-i18n="close">Fechar</button>
      </div>
    </div>
  </div>

  <!-- ── Icon Picker Modal ─────────────────────────────────────────── -->
  <div id="icon-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span data-i18n="selectIcon">Selecionar ícone</span>
        <button id="modal-close" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-file-row">
          <button id="modal-pick-file" class="btn-primary" data-i18n="pickFile">📂 Selecionar arquivo</button>
          <span id="modal-file-label" class="modal-file-label"></span>
        </div>
        <div id="modal-loading" class="modal-status hidden" data-i18n="extracting">Extraindo ícones…</div>
        <div id="modal-empty"   class="modal-status hidden" data-i18n="noIcons">Nenhum ícone encontrado.</div>
        <div id="icon-grid" class="icon-grid"></div>
      </div>
      <div class="modal-footer">
        <button id="modal-apply"  class="btn-primary" disabled data-i18n="apply">Aplicar</button>
        <button id="modal-cancel" class="btn-primary btn-secondary" data-i18n="cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="settings.js"></script>
</body>
</html>
