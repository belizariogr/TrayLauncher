<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div id="app">

    <section class="card">
      <h3>Modo de visualização</h3>
      <div class="toggle-group">
        <button id="btn-icons" class="toggle" data-mode="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="2" y="2" width="9" height="9" rx="1.5"/>
            <rect x="13" y="2" width="9" height="9" rx="1.5"/>
            <rect x="2" y="13" width="9" height="9" rx="1.5"/>
            <rect x="13" y="13" width="9" height="9" rx="1.5"/>
          </svg>
          Ícones
        </button>
        <button id="btn-list" class="toggle" data-mode="list">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6" stroke-linecap="round" stroke-width="2.5"/>
            <line x1="3" y1="12" x2="3.01" y2="12" stroke-linecap="round" stroke-width="2.5"/>
            <line x1="3" y1="18" x2="3.01" y2="18" stroke-linecap="round" stroke-width="2.5"/>
          </svg>
          Lista
        </button>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h3>Itens do launcher</h3>
        <div class="add-group">
          <button id="btn-add-file" class="btn-primary">+ Arquivo</button>
          <button id="btn-add-folder" class="btn-primary btn-secondary">+ Pasta</button>
          <button id="btn-add-separator" class="btn-primary btn-secondary">+ Separador</button>
        </div>
      </div>
      <p class="hint">Executáveis, atalhos (.lnk), .bat, pastas</p>
      <div id="items-list"></div>
    </section>

  </div>

  <!-- ── Icon Picker Modal ─────────────────────────────────────────── -->
  <div id="icon-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>Selecionar ícone</span>
        <button id="modal-close" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-file-row">
          <button id="modal-pick-file" class="btn-primary">📂 Selecionar arquivo</button>
          <span id="modal-file-label" class="modal-file-label"></span>
        </div>
        <div id="modal-loading" class="modal-status hidden">Extraindo ícones…</div>
        <div id="modal-empty"   class="modal-status hidden">Nenhum ícone encontrado.</div>
        <div id="icon-grid" class="icon-grid"></div>
      </div>
      <div class="modal-footer">
        <button id="modal-apply"  class="btn-primary" disabled>Aplicar</button>
        <button id="modal-cancel" class="btn-primary btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
